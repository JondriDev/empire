<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#2e1065"/>
    </linearGradient>
    <linearGradient id="crown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Crown -->
  <path d="M100,375 L48,150 L140,225 L160,70 L180,225 L272,150 L220,375 Z" fill="url(#crown)" stroke="#fbbf24" stroke-width="4" stroke-linejoin="round"/>
  <!-- Orbital ring -->
  <ellipse cx="256" cy="310" rx="130" ry="36" fill="none" stroke="url(#glow)" stroke-width="5" opacity="0.5"/>
  <ellipse cx="256" cy="310" rx="130" ry="36" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.25"/>
  <!-- Core -->
  <circle cx="256" cy="310" r="18" fill="url(#glow)" opacity="0.3"/>
  <circle cx="256" cy="310" r="9" fill="white" opacity="0.8"/>
  <!-- Orbits -->
  <circle cx="256" cy="274" r="6" fill="#22d3ee" opacity="0.7"/>
  <circle cx="373" cy="300" r="5" fill="#a855f7" opacity="0.5"/>
</svg>