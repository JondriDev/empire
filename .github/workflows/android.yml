name: Android APK

# Builds the offline Android app (Capacitor) and uploads the APK as an artifact.
# No PC needed: trigger from the GitHub UI (Actions tab), then download the APK
# from the run's "Artifacts" section and install it on the Samsung S9 FE
# (enable "Install unknown apps" for your browser/file manager).
# Version tags are handled by release.yml (which also publishes the Release).

on:
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22   # Capacitor CLI v8 requires Node >=22
          cache: npm

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'   # Capacitor 8's Android lib compiles with source release 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (offline bundle)
        run: npm run build

      - name: Capacitor sync (Android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: the-empire-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
