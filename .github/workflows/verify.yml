name: Verify build

# PR-blocking correctness gate. Builds the app, runs the unit tests, and runs the
# "shell-is-styled" guard (scripts/check-shell-styled.mjs) that asserts the built
# bundle still has a top-level `.empire-desktop{…position:fixed…}` rule and zero
# `.hide-sm .empire-desktop` — i.e. the desktop home shell can't silently render
# unstyled behind a green build (the #10 blank-dark regression). Cheap; runs on
# every PR and every push to main.

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b && vite build)
        run: npm run build

      - name: Unit tests
        run: npx vitest run

      - name: Guard — desktop shell stays styled (blank-dark trap #10)
        run: node scripts/check-shell-styled.mjs
