name: Verify build

# PR-blocking correctness gate. Builds the app, runs the unit tests, lints
# (`npx eslint .` — fails on any eslint *error*, so a react-refresh / unused-var
# regression can't drift in behind a green build, the lesson from the
# icons/index.tsx fast-refresh errors that CI silently let through), and runs the
# "shell-is-styled" guard (scripts/check-shell-styled.mjs) that asserts the built
# bundle still has a top-level `.empire-desktop{…position:fixed…}` rule and zero
# `.hide-sm .empire-desktop` — i.e. the desktop home shell can't silently render
# unstyled behind a green build (the #10 blank-dark regression). Also runs the
# "route-parity" guard (scripts/check-route-parity.mjs) that asserts the app
# registry (src/lib/registry.ts) and the lazy component map (src/lib/appComponents.tsx)
# stay in lockstep — so an app added to one but not the other can't slip through
# as an "App not available" fallback behind a green build. Finally runs the
# "design-system conformance" gate (scripts/metrics.mjs --assert-zero) that fails
# if any raw hex/rgb literal (tokenViolations) or off-system Tailwind palette
# class (offSystemUtilities) re-enters src/ — locking the EPIC-5 1076→0 sweep so
# the one-palette/themeable win can't silently rot. Finally runs the "dependency
# security audit" gate (scripts/check-audit.mjs) that fails if a NEW high/critical
# npm advisory enters the tree — the deliberately-deferred dev-tooling advisories
# (vite/vitest/esbuild dev-server-only, need a major bump) are documented in that
# script's ALLOWLIST with a reason, so only a genuinely new shipped-dependency CVE
# fails the build, and no human has to re-triage `npm audit` by hand each week.
# Cheap; runs on every PR and every push to main.

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b && vite build)
        run: npm run build

      - name: Unit tests
        run: npx vitest run

      - name: Lint (eslint — fails on any error)
        run: npx eslint .

      - name: Guard — desktop shell stays styled (blank-dark trap #10)
        run: node scripts/check-shell-styled.mjs

      - name: Guard — registry ↔ appComponents route parity (App-not-available drift)
        run: node scripts/check-route-parity.mjs

      - name: Guard — design-system conformance (tokenViolations=0, offSystemUtilities=0)
        run: node scripts/metrics.mjs --assert-zero

      - name: Guard — dependency security audit (fails on any NEW high/critical vuln)
        run: node scripts/check-audit.mjs

      - name: Smoke — backend server boots + new health endpoints respond
        run: |
          node -e "
            const p = require('child_process').spawn('node', ['server.js'], { env: {...process.env, PORT: '3099', EMPIRE_HOST: '127.0.0.1', EMPIRE_ROOT: '/tmp', JWT_SECRET: 'ci'} });
            p.stdout.on('data', () => {});
            p.stderr.on('data', () => {});
            setTimeout(() => {
              fetch('http://127.0.0.1:3099/healthz').then(r => r.json()).then(j => { console.log('HEALTHZ', JSON.stringify(j)); p.kill(); process.exit(j.ok ? 0 : 1); }).catch(e => { console.error('HEALTHZ_ERR', e.message); p.kill(); process.exit(1); });
            }, 1500);
          "
