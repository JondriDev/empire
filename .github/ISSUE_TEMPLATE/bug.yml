name: Bug report
description: Something broken in The Empire
labels: [bug]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - Live PWA (jondridev.github.io/empire)
        - Installed PWA (desktop/home screen)
        - Android APK
        - Local dev (npm run dev)
        - Local backend (server.js)
    validations:
      required: true
  - type: input
    id: app
    attributes:
      label: Which app/area?
      placeholder: e.g. Cakra, Reader, Network, the shell
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      render: text
  - type: input
    id: env
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 138 on Android 14
